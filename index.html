<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Ăn Trưa - Nguyễn Thế Trung</title>
    <style>
        :root { --primary: #e74c3c; --secondary: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--secondary); text-align: center; margin-bottom: 15px; font-size: 1.5rem; }
        .section { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; }
        .member-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2); }
        .btn:active { transform: scale(0.98); }
        .result { margin-top: 20px; padding: 20px; background: #fff5f4; border-radius: 12px; border: 2px solid #fadbd8; }
        .qr-area { text-align: center; margin-top: 15px; padding: 15px; background: white; border-radius: 10px; border: 1px solid #eee; }
        .qr-img { max-width: 100%; height: auto; border-radius: 8px; }
        .info-badge { font-size: 0.8rem; color: #7f8c8d; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍴 Chia Tiền Ăn Trưa</h2>
    
    <div class="section" style="background: #fdf2f2;">
        <label>💳 Người nhận: Nguyễn Thế Trung</label>
        <p style="margin: 0; font-size: 0.9rem; color: #666;">Techcombank: 9339686666</p>
    </div>

    <div class="section">
        <label>💰 Tổng hóa đơn (VNĐ)</label>
        <input type="number" id="totalBill" placeholder="Nhập số tiền..." oninput="calculate()">
    </div>

    <div class="section">
        <label>👥 Ai đi ăn hôm nay?</label>
        <div id="memberList"></div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="newName" placeholder="Tên người mới...">
            <button onclick="addMember()" style="width: 70px; background: #95a5a6; border: none; color: white; border-radius: 8px; cursor: pointer;">Thêm</button>
        </div>
    </div>

    <button class="btn" onclick="calculate()">TÍNH TIỀN & XUẤT MÃ QR</button>

    <div id="resultArea" class="result" style="display:none;">
        <div id="summaryText" style="font-size: 1.3rem; font-weight: bold; color: var(--primary); text-align: center;"></div>
        <div id="individualResult" style="margin: 10px 0; text-align: center; color: #34495e;"></div>
        
        <div class="qr-area">
            <img id="qrCode" class="qr-img" src="" alt="QR Chuyển tiền">
            <div class="info-badge">Quét mã để chuyển cho Trung</div>
        </div>
    </div>
</div>

<script>
    // Cấu hình thông tin của bạn
    const MY_BANK = "TCB";
    const MY_ACC = "9339686666";
    const MY_NAME = "NGUYEN THE TRUNG";

    let members = JSON.parse(localStorage.getItem('lunch_members')) || ["Toản", "Cảnh", "Trung", "Tính"];

    function renderMembers() {
        const list = document.getElementById('memberList');
        list.innerHTML = '';
        members.forEach((name, index) => {
            list.innerHTML += `
                <div class="member-item">
                    <span>${name}</span>
                    <input type="checkbox" class="attend-check" checked onchange="calculate()">
                </div>
            `;
        });
        localStorage.setItem('lunch_members', JSON.stringify(members));
    }

    function addMember() {
        const nameInput = document.getElementById('newName');
        if (nameInput.value.trim() !== "") {
            members.push(nameInput.value.trim());
            nameInput.value = "";
            renderMembers();
        }
    }

    function calculate() {
        const total = parseFloat(document.getElementById('totalBill').value) || 0;
        const checkboxes = document.querySelectorAll('.attend-check');
        const attended = [];
        checkboxes.forEach((cb, i) => { if(cb.checked) attended.push(members[i]); });

        const resultArea = document.getElementById('resultArea');
        if (attended.length > 0 && total > 0) {
            const perPerson = Math.ceil((total / attended.length) / 1000) * 1000;
            resultArea.style.display = 'block';
            document.getElementById('summaryText').innerText = `Mỗi người: ${perPerson.toLocaleString()}đ`;
            
            document.getElementById('individualResult').innerText = `(Chia cho ${attended.length} người)`;

            // Tạo mã QR VietQR tự động với thông tin của Trung
            const qrUrl = `https://img.vietqr.io/image/${MY_BANK}-${MY_ACC}-compact2.png?amount=${perPerson}&addInfo=Tien%20an%20trua&accountName=${encodeURIComponent(MY_NAME)}`;
            document.getElementById('qrCode').src = qrUrl;
        } else {
            resultArea.style.display = 'none';
        }
    }

    renderMembers();
</script>

</body>
</html>
